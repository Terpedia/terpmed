name: Nightly PubMed Search

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run nightly PubMed refresh
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          PUBMED_REQUEST_DELAY: "0.34"
        run: |
          python scripts/run_pubmed_nightly.py

      - name: Commit latest data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data public/results.csv public/results.json public/index.html
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh pubmed search results"
            git push
          else
            echo "No changes to publish."
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Report page URL
        run: echo "Pages published at ${{ steps.deploy.outputs.page_url }}"
